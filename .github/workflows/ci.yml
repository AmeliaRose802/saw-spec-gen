name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  # Allow re-running the (slow) SAW demo suite on demand without pushing.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --verbose

    - name: Run unit tests
      run: cargo test --lib --verbose

    - name: Run integration tests
      run: cargo test --test integration_test --verbose

    - name: Check no warnings
      run: cargo build 2>&1
      env:
        RUSTFLAGS: "-D warnings"

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Clippy
      run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt -- --check

  line-count:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Enforce 500 non-whitespace line limit
      run: bash scripts/check-line-count.sh

  saw-demos:
    # First-run installs ~1.2 GB of tooling (LLVM, SAW with bundled
    # solvers, plus pwsh on Linux) before the demos start, then works
    # through ~70 cases. Cached runs skip the download. BOTH OSes are
    # marked experimental for now (continue-on-error) — failures are
    # informational and do not block the workflow. Demo coverage is
    # still stabilising across both platforms.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: 'SAW demo suite (Linux, experimental)'
            experimental: true
            install_cmd: 'bash scripts/init.sh'
            cache_key: 'linux-saw1.5-llvm20.1.6-pwsh7.6.2'
            cache_hashfiles: "${{ hashFiles('scripts/init.sh', 'scripts/init-saw-source.sh') }}"
          - os: windows-latest
            name: 'SAW demo suite (Windows, experimental)'
            experimental: true
            install_cmd: 'pwsh -NoLogo -NoProfile -File scripts/init.ps1'
            cache_key: 'windows-saw1.5-llvm20.1.6'
            cache_hashfiles: "${{ hashFiles('scripts/init.ps1') }}"
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target (saw-spec-gen build)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-sawdemos-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-sawdemos-cargo-

    # Split restore/save so the (slow, ~1.2 GB) tool install is cached
    # even when the demo step itself fails — otherwise actions/cache@v4
    # would skip the save on failure and every red run would re-download.
    # Cache key embeds the pinned versions from the installer; bumping
    # the script invalidates the cache automatically.
    - name: Restore SAW + LLVM toolchain cache
      id: restore-tools
      uses: actions/cache/restore@v4
      with:
        path: ~/.saw-spec-gen
        key: ${{ matrix.cache_key }}-${{ matrix.cache_hashfiles }}

    - name: Install SAW, LLVM (+ pwsh on Linux); build saw-spec-gen
      shell: bash
      env:
        # Rust is already installed by dtolnay/rust-toolchain. init.sh
        # honours SKIP_RUST_INSTALL; init.ps1 only verifies rustc is on
        # PATH (which it is, via the dtolnay action) so no flag needed.
        SKIP_RUST_INSTALL: "1"
        # init.sh only: never prompt for sudo in non-interactive CI.
        SKIP_SUDO_INSTALL: "1"
      run: ${{ matrix.install_cmd }}

    - name: Save SAW + LLVM toolchain cache
      if: always() && steps.restore-tools.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.saw-spec-gen
        key: ${{ steps.restore-tools.outputs.cache-primary-key }}

    - name: Run SAW demo suite
      shell: pwsh
      # discover-tools.ps1 auto-sources ~/.saw-spec-gen/env.ps1 inside
      # the runner, so clang, llvm-as, saw, z3, and rustc are all picked
      # up without any extra PATH setup here.
      run: pwsh -NoLogo -NoProfile -File tests/saw_demos/Run-SawDemos.ps1

    - name: Upload failing-case logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: saw-demos-fail-logs-${{ runner.os }}
        path: tests/saw_demos/last-fail-*.log
        if-no-files-found: ignore
