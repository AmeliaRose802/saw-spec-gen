name: Release

# Build cross-platform release binaries and publish a GitHub Release
# whenever a push to main changes the version in Cargo.toml.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. Read Cargo.toml version and decide whether to release ──────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag:     ${{ steps.meta.outputs.tag }}
      release: ${{ steps.meta.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need tags to check for duplicates

      - name: Extract version and check tag
        id: meta
        run: |
          version=$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${version} — will release."
            echo "release=true"  >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Build release binaries on each platform ────────────────────
  build:
    needs: check-version
    if: needs.check-version.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: saw-spec-gen-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: saw-spec-gen-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: saw-spec-gen-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ runner.os }}-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/saw-spec-gen staging/
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz saw-spec-gen

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/saw-spec-gen.exe" staging/
          Compress-Archive -Path staging/saw-spec-gen.exe -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  # ── 3. Create the GitHub Release and attach all binaries ──────────
  publish:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: saw-spec-gen ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
