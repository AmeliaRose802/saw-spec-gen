# Per-spec config for count_bytes_spec.cry (cryptol_len_bind e2e fixture).
#
# This file is a sibling of count_bytes_spec.cry and shares its name.
# saw-spec-gen discovers it automatically when that spec is passed via
# --cryptol-spec, with no CLI flag or directory-level config needed.
#
# Enables bind_cryptol_lengths so saw-spec-gen reads the upper bound
# from the length-polymorphic Cryptol signature ({n}(fin n, n <= 8) => ...)
# and allocates the right-sized buffer without any SAL annotation on the
# C++ source.
bind_cryptol_lengths = true
