name: Publish CI image

# Builds and publishes the pre-baked toolchain image used by the Linux
# e2e-tests job in ci.yml. The image bundles SAW 1.5, LLVM 20.1.6,
# PowerShell 7.6.2, and a stable Rust toolchain so the e2e-tests job skips
# the ~1.2 GB install dance every run.
#
# Triggers:
#   - Push to master / fix-ci-checks that changes the Dockerfile or any
#     install script that the image's contents track.
#   - Manual workflow_dispatch (re-publish without a code change).
#
# Publishes to:
#   ghcr.io/<owner>/<repo>-ci:latest   (always)
#   ghcr.io/<owner>/<repo>-ci:<sha>    (immutable per-commit tag)
#
# After the first successful publish, flip the package visibility to
# Public in the repo's Packages settings so ci.yml's `container:` step
# can pull without credentials. Until then, the `credentials:` block in
# ci.yml uses GITHUB_TOKEN which works for private packages too.

on:
  push:
    branches: [master, fix-ci-checks]
    paths:
      - 'Dockerfile'
      - 'scripts/init.sh'
      - 'scripts/init-saw-source.sh'
      - '.github/workflows/publish-ci-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the repo owner — GHCR rejects mixed-case names.
      - name: Compute image tag
        id: tag
        run: |
          owner_lower="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo_lower="$(basename '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lower}/${repo_lower}-ci"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Publishing to ${image}:latest and :${GITHUB_SHA::12}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:latest
            ${{ steps.tag.outputs.image }}:${{ github.sha }}
          # Registry-side layer cache so re-publishes only rebuild
          # changed layers (e.g. bumping a single ARG version).
          cache-from: type=registry,ref=${{ steps.tag.outputs.image }}:buildcache
          cache-to:   type=registry,ref=${{ steps.tag.outputs.image }}:buildcache,mode=max
